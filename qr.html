<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商談スライド QRコード</title>
<style>
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:#eef2f8;color:#1b2733;text-align:center;padding:40px 16px;}
  h1{font-size:20px;color:#21408f;}
  .card{background:#fff;display:inline-block;padding:28px 28px 22px;border-radius:18px;box-shadow:0 4px 20px rgba(20,40,80,.1);}
  img{width:300px;height:300px;display:block;}
  .url{margin-top:14px;font-size:14px;color:#2f53c8;font-weight:700;word-break:break-all;}
  .hint{margin-top:18px;color:#5d6b7a;font-size:14px;}
</style>
</head>
<body>
  <h1>住宅ローン商談スライド</h1>
  <div class="card">
    <img id="qr" alt="QRコード">
    <div class="url">https://kkagemasa-sketch.github.io/shodan-slide/</div>
  </div>
  <div class="hint">iPad・スマホのカメラでこのQRを読み取ると、スライドが開きます</div>
<script>
  const url='https://kkagemasa-sketch.github.io/shodan-slide/';
  document.getElementById('qr').src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=8&data='+encodeURIComponent(url);
</script>
</body>
</html>
